<style>

      }

        background-image: radial-gradient(#e1bfb5 0.5px, transparent 0.5px), radial-gradient(#e1bfb5 0.5px, #f8f9ff 0.5px);
        background-size: 20px 20px;
        background-position: 0 0, 10px 10px;
        opacity: 0.4;
      }

      .animate-float {
        animation: float 6s ease-in-out infinite;
      }

      @keyframes float {
        0% { transform: translateY(0px); }
        50% { transform: translateY(-10px); }
        100% { transform: translateY(0px); }
      }

      .glass-card {
        background: rgba(255, 255, 255, 0.7);
        backdrop-filter: blur(12px);

    body {
      min-height: max(884px, 100dvh);

<body class="bg-background text-on-background min-h-screen flex flex-col font-body-md overflow-hidden">
<!-- Background Layer -->
<div class="fixed inset-0 z-0 bg-soft-pattern"></div>
<div class="fixed inset-0 z-0 bg-gradient-to-b from-surface/20 via-transparent to-surface-container/40"></div>
<!-- Main Content Canvas -->
<main class="relative z-10 flex-1 flex flex-col items-center justify-between px-container-padding pt-xl pb-xl w-full max-w-md mx-auto h-screen">
<!-- Brand Identity Section -->
<header class="w-full flex flex-col items-center space-y-md animate-float">
<div class="w-20 h-20 bg-primary-container rounded-2xl flex items-center justify-center shadow-lg transform rotate-3">
<span class="material-symbols-outlined text-on-primary-container text-[48px]" data-icon="restaurant">restaurant</span>
</div>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-primary font-bold tracking-tight">
                LuxeDine
            </h1>
</header>
<!-- Welcome Message Section (Bento-style layout intent) -->
<section class="w-full space-y-lg text-center flex flex-col items-center">
<div class="w-full glass-card p-xl rounded-3xl shadow-sm space-y-md">
<div class="inline-flex items-center gap-xs px-3 py-1 bg-secondary-container text-on-secondary-container rounded-full mb-base">
<span class="material-symbols-outlined text-[18px]" data-icon="table_restaurant">table_restaurant</span>
<span class="font-label-sm text-label-sm">Table 12</span>
</div>
<h2 class="font-headline-xl text-headline-xl text-on-surface">
                    Welcome to <span class="text-primary">Table 12</span>
</h2>
<p class="font-body-lg text-body-lg text-on-surface-variant max-w-[280px] mx-auto leading-relaxed">
                    Ready to discover something delicious? Tap below to explore our menu and order directly from your table.
                </p>
</div>
<!-- Visual Decorative Element -->
<div class="relative w-full h-48 mt-md">
<div class="absolute inset-0 flex justify-center items-center">
<div class="w-64 h-64 bg-primary-fixed-dim/20 rounded-full blur-3xl"></div>
</div>
<div class="relative z-10 w-full h-full rounded-2xl overflow-hidden shadow-xl border-4 border-surface-container-lowest">
<img class="w-full h-full object-cover" data-alt="A high-end, close-up professional food photography shot of a gourmet appetizer served on a minimalist white ceramic plate. The setting is a luxury restaurant with soft, warm golden lighting and deep shadows creating a premium atmosphere. The color palette features rich oranges from saffron and deep greens from micro-herbs, perfectly matching the LuxeDine brand colors. The image is captured with a shallow depth of field, focusing on the intricate textures of the food." src="https://lh3.googleusercontent.com/aida-public/AB6AXuCjktTutHxGEc8tlh-5Ra-utVLaTpECw1oPeLyGWePn-O5wQjIoHU-Z9COtS2lq_R3GAS3AZqffW8BMZ0dzI1a-Bnuhcwjvb1DRSHodMNc6_Z4X1LOgy1feKHpy-pjtrUOUSIv4xeKZIe1EvPYnR7pIucxgCrpf6nm0ZsTVEMNGRTHRF8Px5a9UVYlIDqyIM8FrOTRtYBqGB49TyMCXVFBCmx0VgrI4AMgeCWyDaZtUu0lxXPM9TrTBL066EUcSpBmY-KzL0qeE6Js"/>
</div>
</div>
</section>
<!-- Primary Action Anchor -->
<footer class="w-full pt-lg">
<button class="group relative w-full h-16 bg-primary-container text-on-primary-container rounded-xl shadow-lg active:scale-95 transition-all duration-200 flex items-center justify-center gap-md hover:bg-primary transition-colors overflow-hidden" onclick="handleContinue()">
<!-- Button Shine Effect -->
<div class="absolute inset-0 w-full h-full bg-gradient-to-r from-transparent via-white/20 to-transparent -translate-x-full group-hover:translate-x-full transition-transform duration-700"></div>
<span class="font-title-md text-title-md font-bold uppercase tracking-wider">Continue to Menu</span>
<span class="material-symbols-outlined font-bold" data-icon="arrow_forward">arrow_forward</span>
</button>
<p class="text-center mt-md font-label-sm text-label-sm text-on-surface-variant opacity-60">
                LuxeDine © 2024 • Smart Table Service
            </p>
</footer>
</main>
<script>
        /**
         * Navigation interaction logic.
         * Since this is a standalone landing screen, we simulate the transition
         * to the main application menu.
         */
        function handleContinue() {
            const btn = document.querySelector('button');
            const icon = btn.querySelector('.material-symbols-outlined');
            
            // Interaction Feedback
            btn.classList.add('scale-95', 'opacity-90');
            icon.style.transform = 'translateX(8px)';
            
            setTimeout(() => {
                // In a real app, this would route to /menu
                console.log('Navigating to menu...');
                
                // Visual ripple/fade out effect for the landing
                document.body.style.opacity = '0';
                document.body.style.transition = 'opacity 0.5s ease-in-out';
            }, 300);
        }

        // Lightweight entrance animation for elements
        document.addEventListener('DOMContentLoaded', () => {
            const elements = document.querySelectorAll('header, section, footer');
            elements.forEach((el, index) => {
                el.style.opacity = '0';
                el.style.transform = 'translateY(20px)';
                el.style.transition = 'all 0.6s cubic-bezier(0.22, 1, 0.36, 1)';
                
                setTimeout(() => {
                    el.style.opacity = '1';
                    el.style.transform = 'translateY(0)';
                }, 100 + (index * 150));
            });
        });
    </script>
