<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .active-nav-item .material-symbols-outlined {
            font-variation-settings: 'FILL' 1;
        }
        @keyframes slideUp {
            from { transform: translateY(100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .toast-animate {
            animation: slideUp 0.3s ease-out forwards;
        }
        .tap-ripple {
            position: relative;
            overflow: hidden;
        }
        .tap-ripple::after {
            content: "";
            display: block;
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            pointer-events: none;
            background-image: radial-gradient(circle, #fff 10%, transparent 10.01%);
            background-repeat: no-repeat;
            background-position: 50%;
            transform: scale(10, 10);
            opacity: 0;
            transition: transform .5s, opacity 1s;
        }
        .tap-ripple:active::after {
            transform: scale(0, 0);
            opacity: .3;
            transition: 0s;
        }
    </style>

<body class="bg-background text-on-surface min-h-screen flex flex-col font-body-md">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-surface shadow-sm flex justify-between items-center px-container-padding h-16 w-full">
<div class="flex items-center gap-sm">
<div class="w-10 h-10 rounded-full bg-primary-container flex items-center justify-center text-on-primary-container overflow-hidden">
<img alt="LuxeDine Logo" class="w-full h-full object-cover" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCjCslF77aUokB7qc_ncbNPQ6x2Mj69IehLVFfeacfvtPlkTQ_u0rq0DeXT3bNdEJslWpPQDhE8sZd0cWP5qiNncgWs1aH7U5FswpDFPhcjAnQYLTya8H1W2_oKpIUQtRmSPjkpMThXtdJqLSTrittduTWTNN35v_lK7jOg4WNJjXVhmP2QYB-H-NN37F9rrcvFcecKjK6KZ-kitOyu_uh_9vT-Lajd241FqBe4yciGeHan0-OFsdvj4b1ytHRY6QeDVUdpXaGnNkA"/>
</div>
<span class="font-headline-lg-mobile text-headline-lg-mobile text-primary font-bold">LuxeDine</span>
</div>
<button class="w-10 h-10 flex items-center justify-center rounded-full text-on-surface-variant hover:bg-surface-container-high transition-colors active:scale-95 duration-150">
<span class="material-symbols-outlined">notifications</span>
</button>
</header>
<!-- Main Content -->
<main class="flex-1 pt-20 pb-24 px-container-padding max-w-lg mx-auto w-full">
<div class="mb-lg">
<h1 class="font-headline-lg text-headline-lg text-on-surface mb-xs">Need something?</h1>
<p class="text-on-surface-variant font-body-md">Tap a card below and our staff will be right with you.</p>
</div>
<!-- Assistance Grid -->
<div class="grid grid-cols-2 gap-md">
<!-- Call Waiter Card -->
<button class="tap-ripple bg-surface-container-lowest border border-outline-variant rounded-xl p-lg flex flex-col items-center justify-center gap-sm shadow-sm hover:shadow-md transition-all active:scale-95 text-center group" onclick="requestAssistance('Waiter')">
<div class="w-16 h-16 rounded-full bg-primary-container/10 flex items-center justify-center group-hover:bg-primary-container transition-colors">
<span class="material-symbols-outlined text-primary group-hover:text-white text-3xl">person_raised_hand</span>
</div>
<span class="font-title-md text-title-md text-on-surface">Call Waiter</span>
</button>
<!-- Request Water Card -->
<button class="tap-ripple bg-surface-container-lowest border border-outline-variant rounded-xl p-lg flex flex-col items-center justify-center gap-sm shadow-sm hover:shadow-md transition-all active:scale-95 text-center group" onclick="requestAssistance('Water')">
<div class="w-16 h-16 rounded-full bg-tertiary-container/10 flex items-center justify-center group-hover:bg-tertiary-container transition-colors">
<span class="material-symbols-outlined text-tertiary group-hover:text-white text-3xl">water_full</span>
</div>
<span class="font-title-md text-title-md text-on-surface">Request Water</span>
</button>
<!-- Request Bill Card -->
<button class="tap-ripple bg-surface-container-lowest border border-outline-variant rounded-xl p-lg flex flex-col items-center justify-center gap-sm shadow-sm hover:shadow-md transition-all active:scale-95 text-center group" onclick="requestAssistance('Bill')">
<div class="w-16 h-16 rounded-full bg-secondary-container/20 flex items-center justify-center group-hover:bg-secondary-container transition-colors">
<span class="material-symbols-outlined text-secondary group-hover:text-on-secondary-fixed-variant text-3xl">receipt_long</span>
</div>
<span class="font-title-md text-title-md text-on-surface">Request Bill</span>
</button>
<!-- Need Help Card -->
<button class="tap-ripple bg-surface-container-lowest border border-outline-variant rounded-xl p-lg flex flex-col items-center justify-center gap-sm shadow-sm hover:shadow-md transition-all active:scale-95 text-center group" onclick="requestAssistance('Support')">
<div class="w-16 h-16 rounded-full bg-inverse-surface/5 flex items-center justify-center group-hover:bg-inverse-surface transition-colors">
<span class="material-symbols-outlined text-on-surface-variant group-hover:text-inverse-on-surface text-3xl">support_agent</span>
</div>
<span class="font-title-md text-title-md text-on-surface">Need Help</span>
</button>
</div>
<!-- Illustration Area (Atmospheric) -->
<div class="mt-xl opacity-60">
<div class="h-48 w-full rounded-2xl overflow-hidden relative border border-outline-variant">
<img alt="Atmospheric Restaurant Background" class="w-full h-full object-cover" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBCxJ_Yevy7K7gGz1fC8gyw4DC35QvOQvjKdC0srpz-BUEg7iqt41r11Fg4TrNjIGPl6XGM7HS4GJt74R9m9R3FKw6Qg9VIRg0DNeEVXY0XsAMjmrqrszJzPbDCS2BaIx5lnRXebTzr9Gu72l2KJkmOLjeZzqzp9S337FkfSNUJroWSk7i5zJ_tLb3Ou0ONz8tXkBnqWw9iNOSscg_v3V5uPApO_rhOJIIQs5YjpNk3NERxA7vd99LcpryV57_9vbZRujbP5HDPr8o"/>
<div class="absolute inset-0 bg-gradient-to-t from-background to-transparent"></div>
</div>
</div>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 w-full z-50 flex justify-around items-center h-20 px-2 pb-2 bg-surface-container rounded-t-xl shadow-lg border-t border-outline-variant">
<a class="flex flex-col items-center justify-center text-on-surface-variant hover:bg-surface-container-high px-4 py-1 rounded-full transition-all active:scale-90" href="#">
<span class="material-symbols-outlined">restaurant_menu</span>
<span class="font-label-sm text-label-sm">Menu</span>
</a>
<a class="flex flex-col items-center justify-center text-on-surface-variant hover:bg-surface-container-high px-4 py-1 rounded-full transition-all active:scale-90" href="#">
<span class="material-symbols-outlined">shopping_cart</span>
<span class="font-label-sm text-label-sm">Cart</span>
</a>
<a class="flex flex-col items-center justify-center text-on-surface-variant hover:bg-surface-container-high px-4 py-1 rounded-full transition-all active:scale-90" href="#">
<span class="material-symbols-outlined">receipt_long</span>
<span class="font-label-sm text-label-sm">Orders</span>
</a>
<a class="flex flex-col items-center justify-center bg-primary-container text-on-primary-container rounded-full px-4 py-1 transition-all active:scale-90 active-nav-item" href="#">
<span class="material-symbols-outlined">support_agent</span>
<span class="font-label-sm text-label-sm">Help</span>
</a>
</nav>
<!-- Toast Notification (Hidden by default) -->
<div class="hidden fixed bottom-24 left-1/2 -translate-x-1/2 z-[60] w-[90%] max-w-sm" id="toast">
<div class="bg-inverse-surface text-inverse-on-surface px-lg py-md rounded-xl shadow-xl flex items-center gap-md toast-animate">
<span class="material-symbols-outlined text-secondary-fixed">check_circle</span>
<div>
<p class="font-title-md text-body-lg font-semibold">Assistance requested!</p>
<p class="text-sm opacity-80">A staff member will be with you shortly.</p>
</div>
</div>
</div>
<script>
        function requestAssistance(type) {
            const toast = document.getElementById('toast');
            toast.classList.remove('hidden');
            
            // Auto hide after 3 seconds
            setTimeout(() => {
                toast.classList.add('hidden');
            }, 3000);

            // Logic for specific request could go here
            console.log('Request for: ' + type);
        }
    </script>
</body></html>
